name: CI

on:
  push:
    branches: [ main, Implement_automated_market ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  STELLAR_NETWORK: testnet

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Safety: ensure mainnet config is never loaded in CI
      - name: Guard — reject mainnet in CI
        run: |
          if [ "${STELLAR_NETWORK}" = "mainnet" ]; then
            echo "ERROR: STELLAR_NETWORK=mainnet is not allowed in CI" && exit 1
          fi

      # Checkout repository
      - uses: actions/checkout@v4

      # Setup Rust toolchain with required components and target
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      # Cache dependencies for faster builds
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-swipe

      # Change directory to stellar-swipe
      - name: Change to stellar-swipe
        run: cd stellar-swipe

      # Format check for entire workspace
      - name: Format check
        run: cd stellar-swipe && cargo fmt --all -- --check

      # Clippy linter for all workspace crates
      - name: Clippy
        run: cd stellar-swipe && cargo clippy --workspace --all-targets -- -D warnings

      # Run tests for all workspace crates
      - name: Tests
        run: cd stellar-swipe && cargo test --workspace --all-targets

      # CPU instruction-budget regression gate.
      # Runs tests, captures BUDGET_METRIC lines, and fails if any entrypoint
      # exceeds its committed baseline by more than the configured threshold.
      # To update the baseline: run scripts/update_budget_baseline.sh locally,
      # commit the updated baselines/instruction_budget_baseline.json, and add
      # a PR description explaining why the regression is expected/accepted.
      - name: Budget regression check
        run: |
          cd stellar-swipe && cargo test --workspace --all-targets 2>&1 \
            | python3 scripts/check_budget_baseline.py

      # Audit dependency versions consistency
      - name: Audit workspace dependencies
        run: python3 stellar-swipe/scripts/audit_dependencies.py

      # Verify #![no_std] compliance of contract crates
      - name: Verify #![no_std] compliance
        run: python3 stellar-swipe/scripts/verify_no_std.py

      # Release WASM (workspace [profile.release]) + stellar contract optimize
      # Prebuilt release binary — avoids compiling libdbus-sys from source via cargo install
      - name: Install Stellar CLI
        run: |
          set -euo pipefail
          version="25.2.0"
          install_dir="$HOME/.local/bin"
          mkdir -p "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"
          curl -fL \
            "https://github.com/stellar/stellar-cli/releases/download/v${version}/stellar-cli-${version}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$install_dir"
          chmod +x "$install_dir/stellar"
          stellar --version

      - name: Build optimized Soroban WASM
        run: cd stellar-swipe && chmod +x scripts/build.sh && ./scripts/build.sh

      - name: Upload optimized WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm-optimized
          path: stellar-swipe/target/wasm-optimized/*.wasm
          if-no-files-found: error

  # ── Fuzz job (runs on PRs touching common/ or shared/) ────────────────────
  fuzz:
    runs-on: ubuntu-latest
    # Only run fuzzing on PRs that touch the targeted modules.
    if: |
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.title, 'common') ||
        contains(toJson(github.event.pull_request.changed_files), 'contracts/common') ||
        contains(toJson(github.event.pull_request.changed_files), 'contracts/shared')
      )

    steps:
      - uses: actions/checkout@v4

      # Fuzzing requires a nightly toolchain (libfuzzer).
      - name: Setup nightly Rust for fuzzing
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-swipe/contracts/common/fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # Run each fuzz target for a bounded time budget.
      # 30 seconds per target keeps the job fast; run locally for longer coverage.
      - name: Fuzz — storage_key_derivation (30s)
        run: |
          cd stellar-swipe/contracts/common
          cargo +nightly fuzz run storage_key_derivation -- \
            -max_total_time=30 \
            -timeout=10 \
            -detect_leaks=0

      - name: Fuzz — xdr_roundtrip (30s)
        run: |
          cd stellar-swipe/contracts/common
          cargo +nightly fuzz run xdr_roundtrip -- \
            -max_total_time=30 \
            -timeout=10 \
            -detect_leaks=0

      # Upload any crash artifacts found during the bounded run.
      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: |
            stellar-swipe/contracts/common/fuzz/artifacts/
            stellar-swipe/contracts/common/fuzz/corpus/
          if-no-files-found: ignore
